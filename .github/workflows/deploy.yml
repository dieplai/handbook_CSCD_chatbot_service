name: Deploy

on:
  push:
    branches: [main]

# Deploy only after CI succeeds on the same commit.
jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []  # gate via branch protection requiring CI; see README
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_DIR }}
            git pull --ff-only
            docker compose up -d --build
            # Post-deploy gate: fail the job if the service isn't healthy.
            sleep 5
            curl -fsS http://127.0.0.1:8000/v1/health
