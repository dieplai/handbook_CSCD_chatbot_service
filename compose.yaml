services:
  handbook-cscd:
    build: .
    image: handbook-cscd:latest
    restart: unless-stopped
    env_file: .env
    # Bind to loopback only — the user's nginx terminates TLS and proxies in.
    # NEVER expose this port directly to the internet (no TLS here).
    # Host port 8010: the VPS already runs an epr-* stack on 8000/8001/8100/8101.
    ports:
      - "127.0.0.1:8010:8000"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
